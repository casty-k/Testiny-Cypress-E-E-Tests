name: Sync Testiny → Cypress

on:
  # Scheduled sync (daily at 6 AM UTC)
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger from GitHub UI
  workflow_dispatch:

  # Webhook trigger from Testiny
  repository_dispatch:
    types: [testiny-update]

jobs:
  sync-testcases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Testiny sync
        env:
          TESTINY_API_TOKEN: ${{ secrets.TESTINY_API_TOKEN || '' }}
          TESTINY_PROJECT_ID: 66
        run: npm run sync:testiny

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has-changes == 'true'
        run: |
          git config user.name "Testiny Sync Bot"
          git config user.email "sync@testiny.io"
          git add cypress/features/
          git commit -m "chore: sync Testiny → Cypress feature files"
          git push

      - name: Create Pull Request
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: sync Testiny → Cypress feature files'
          title: 'chore: sync Testiny → Cypress feature files'
          body: |
            ## 📝 Automatic Testiny Sync

            This PR contains automatically generated feature files from Testiny test cases.

            ### What changed:
            - Updated/created Cypress BDD feature files
            - Gherkin scenarios from Testiny test cases

            ### Next steps:
            1. Review the changes in the "Files changed" tab
            2. Merge if changes look good
            3. Implement step definitions for new scenarios
            4. Run `npm run cypress:run` to execute tests

            ### ℹ️ Notes:
            - Feature files are auto-generated; edit test cases in Testiny
            - Do not manually edit generated feature files
            - Sync runs daily at 6 AM UTC and on Testiny updates
          branch: chore/sync-testiny-cypress
          delete-branch: true
          reviewers: |
            ${{ github.repository_owner }}
          labels: 'automation, testiny-sync'

      - name: Skip PR (no changes)
        if: steps.check-changes.outputs.has-changes == 'false'
        run: |
          echo "✅ No changes detected"
          echo "Feature files are up to date with Testiny"

      - name: Sync Summary
        run: |
          echo "🔄 Sync Summary:"
          echo "  Project ID: OS2"
          echo "  Features directory: cypress/features/"
          echo "  API: Testiny"
          echo "  Status: Complete ✅"